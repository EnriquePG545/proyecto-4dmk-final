<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="robots" content="noindex, nofollow">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>4DMK | Crear Cuenta</title>

    <meta name="theme-color" content="#070b16">

    <link rel="icon" href="img/logo.png" type="image/png">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="img/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="4DMK">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css">

    <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- SUPABASE CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-page">

    <main class="login-container">

        <section class="login-card">

            <a href="index.html" class="login-logo ocultar-en-app">
                <img src="img/logo.png" alt="Logo 4DMK">
            </a>

            <p class="login-tag">Cuenta de cliente</p>

            <h1>Crear cuenta</h1>

            <p class="login-text">
                Regístrate para solicitar cotizaciones y revisar el estado de tus pedidos.
            </p>

            <form id="registroForm" class="login-form" autocomplete="off">

                <div class="form-group">
                    <label for="nombreCompleto">Nombre completo</label>
                    <input 
                        type="text" 
                        id="nombreCompleto" 
                        placeholder="Ingresa tu nombre completo"
                        autocomplete="name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono / WhatsApp</label>
                    <input 
                        type="tel" 
                        id="telefono" 
                        placeholder="Ejemplo: 987654321"
                        autocomplete="tel"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Ingresa tu correo"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>

                    <div class="password-box">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Mínimo 6 caracteres"
                            autocomplete="new-password"
                            required
                        >

                        <button type="button" id="togglePassword">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    <i class="fa-solid fa-user-plus"></i>
                    Crear cuenta
                </button>

                <p id="registroMensaje" class="login-mensaje"></p>

            </form>

            <a href="login.html" class="login-volver">
                Ya tengo una cuenta
            </a>

            <a href="index.html" class="login-volver ocultar-en-app">
                <i class="fa-solid fa-arrow-left"></i>
                Volver a la página principal
            </a>

        </section>

    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/registro.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
