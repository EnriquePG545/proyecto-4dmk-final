<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4DMK | Iniciar Sesión</title>

    <link rel="stylesheet" href="css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="body-login">

    <div class="login-fondo-premium">
        <div class="onda onda-1"></div>
        <div class="onda onda-2"></div>
        <div class="onda onda-3"></div>

        <span class="burbuja b1"></span>
        <span class="burbuja b2"></span>
        <span class="burbuja b3"></span>
        <span class="burbuja b4"></span>
        <span class="burbuja b5"></span>
        <span class="burbuja b6"></span>

        <div class="brillo-login brillo-1"></div>
        <div class="brillo-login brillo-2"></div>
    </div>

    <div class="login-contenedor">

        <div class="login-card login-card-premium">

            <div class="login-icono">
                <i class="ri-store-3-line"></i>
            </div>

            <div class="login-logo">
                <h1>4DMK</h1>
                <p>Sistema de Gestión de Inventario y Ventas</p>
            </div>

            <form id="formLogin" class="login-form">

                <div class="grupo-formulario">
                    <label>Usuario</label>

                    <div class="login-input-box">
                        <i class="ri-user-line"></i>
                        <input type="text" id="usuario" placeholder="Ingrese su usuario">
                    </div>
                </div>

                <div class="grupo-formulario">
                    <label>Contraseña</label>

                    <div class="password-box login-input-box">
                        <i class="ri-lock-line"></i>
                        <input type="password" id="password" placeholder="Ingrese su contraseña">

                        <button type="button" id="btnVerPassword">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="boton-login">
                    <i class="ri-login-box-line"></i>
                    Iniciar Sesión
                </button>

            </form>

        </div>

    </div>

    <script src="js/login.js?v=sql1"></script>

</body>

</html>
