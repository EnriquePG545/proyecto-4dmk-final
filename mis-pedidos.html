<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="robots" content="noindex, nofollow">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>4DMK | Mis Pedidos</title>

    <meta name="theme-color" content="#070b16">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="4DMK">
    <link rel="icon" href="img/logo.png" type="image/png">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/logo.png">

    <link rel="stylesheet" href="css/estilos.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body.mis-pedidos-page {
            min-height: 100vh;
            background: radial-gradient(circle at top, #16213e 0%, #070b16 55%, #020617 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .mis-pedidos-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .mis-pedidos-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mis-pedidos-logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mis-pedidos-logo img {
            width: 62px;
        }

        .mis-pedidos-logo h1 {
            margin: 0;
            font-size: 28px;
        }

        .mis-pedidos-logo p {
            margin: 4px 0 0 0;
            color: #cbd5e1;
        }

        .mis-pedidos-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-panel {
            border: none;
            cursor: pointer;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            padding: 12px 18px;
            border-radius: 999px;
            font-weight: 700;
        }

        .btn-panel.principal {
            background: #facc15;
            color: #111827;
        }

        .pedidos-card {
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        }

        .pedido-vacio {
            text-align: center;
            padding: 60px 20px;
            color: #cbd5e1;
        }

        .pedido-vacio i {
            font-size: 58px;
            color: #facc15;
            margin-bottom: 18px;
        }

        .pedido-vacio h2 {
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="mis-pedidos-page">

    <main class="mis-pedidos-container">

        <header class="mis-pedidos-header">
            <div class="mis-pedidos-logo">
                <img src="img/logo.png" alt="Logo 4DMK">

                <div>
                    <h1>Mis pedidos</h1>
                    <p id="datosCliente">Cargando información del cliente...</p>
                </div>
            </div>

            <div class="mis-pedidos-actions">
                <a href="cotizar.html" class="btn-panel principal">
                    <i class="fa-solid fa-plus"></i>
                    Nueva cotización
                </a>

                <a href="mi-cuenta.html" class="btn-panel">
                    <i class="fa-solid fa-user-gear"></i>
                    Mi cuenta
                </a>

                <button type="button" class="btn-panel" id="btnCerrarSesionCliente">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar sesión
                </button>
            </div>
        </header>

        <section class="pedidos-card">
            <div class="pedido-vacio">
                <i class="fa-solid fa-clipboard-list"></i>

                <h2>Próximamente verás aquí tus pedidos</h2>

                <p>
                    En la siguiente fase conectaremos esta página con las solicitudes de cotización
                    para que puedas revisar si están pendientes, en proceso, atendidas o canceladas.
                </p>
            </div>
        </section>

    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/mis-pedidos.js?v=progreso1"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
