<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="robots" content="noindex, nofollow">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>4DMK | Login Administrador</title>

    <meta name="theme-color" content="#070b16">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="4DMK">

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="4DMK">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css">

    <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- SUPABASE CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-page">

    <main class="login-container">

        <section class="login-card">

            <a href="index.html" class="login-logo">
                <img src="img/logo.png" alt="Logo 4DMK">
            </a>

            <p class="login-tag">Acceso 4DMK</p>

            <h1>Iniciar sesión</h1>

            <p class="login-text">
                Ingresa a tu cuenta para solicitar cotizaciones, revisar tus pedidos o administrar el sistema de 4DMK.
            </p>

            <form id="loginForm" class="login-form" autocomplete="off">

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Correo del administrador" 
                        autocomplete="off"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>

                    <div class="password-box">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Contraseña"
                        autocomplete="new-password"
                        required
                    >

                        <button type="button" id="togglePassword">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>

                    <a href="recuperar-contrasena.html" class="login-forgot">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Iniciar sesión
                </button>

                <p id="loginMensaje" class="login-mensaje"></p>

            </form>

            <a href="registro.html" class="login-volver">
            ¿No tienes cuenta? Crear cuenta
            </a>

            <a href="index.html" class="login-volver ocultar-en-app">
            <i class="fa-solid fa-arrow-left"></i>
            Volver a la página principal
            </a>

        </section>

    </main>

    <!-- Primero configuración de Supabase -->
    <script src="js/supabase-config.js"></script>

    <!-- Luego lógica del login -->
    <script src="js/login.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
